<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8" />
        <title>email-scheduler</title>
        <link rel="stylesheet" href="{{ url_for('static', path='style.css') }}">
    </head>
    <body>
        <h1>Форма отправки письма</h1>
        <form action="/api/v1/" method="post">
            <input type="email" name="receiver_email" placeholder="Введите почту получателя" required><br>
            <input type="text" name="subject" placeholder="Введите тему письма" required><br>
            <textarea type="text" name="message_body" placeholder="Введите текст письма"></textarea><br>
            <button type="submit">Отправить письмо</button>
        </form>
    </body>
</html>
