<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title>Email Scheduler</title>
    <link rel="stylesheet" href="{{ url_for('static', path='style.css') }}">
    <!-- Подключаем шрифт правильно -->
    <link href="https://fonts.googleapis.com" rel="stylesheet">
    <link rel="icon" href="{{ url_for('static', path='images/favicon.ico') }}"type="image/x-icon">
</head>
<body>
    <div class="form-container">
        <h1 class="main-title">Отправка письма</h1>
        
        <form action="/api/v1/" method="post" class="email-form">
            
            <div class="field-group">
                <input type="email" name="receiver_email" placeholder="example@mail.com" required>
            </div>

            <div class="field-group">
                <input type="text" name="subject" placeholder="Заголовок сообщения" required>
            </div>

            <div class="field-group">
                <textarea name="message_body" placeholder="Введите текст письма..."></textarea>
            </div>

            <div class="field-group">
                <input type="datetime-local" name="sending_time" required>
            </div>

            <button type="submit">Запланировать</button>
        </form>
    </div>
</body>
</html>
