<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title>Email Scheduler · Успешно</title>
    <link rel="stylesheet" href="{{ url_for('static', path='style.css') }}">
    <link href="https://fonts.googleapis.com" rel="stylesheet">
    <link rel="icon" href="{{ url_for('static', path='images/favicon.ico') }}" type="image/x-icon">
</head>
<body>
    <div class="success-container">
        <div class="success-icon">✓</div>
        
        <h1 class="success-title">Письмо принято!</h1>
        
        <div class="success-message">
            <span style="font-size: 20px; display: block; margin-bottom: 8px;">📬</span>
            Ваше письмо успешно добавлено в очередь на отправку.
            <div class="queue-highlight">
                ⏳ ожидает выполнения
            </div>
        </div>

        <div class="success-actions">
            <a href="/email-scheduler" class="btn-primary">Написать ещё одно</a>
        </div>

        <div class="time-info">
            ✦ <strong>мгновенно</strong> добавлено в планировщик <br>
        </div>
    </div>
</body>
</html>
